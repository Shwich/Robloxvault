<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roblox Vault — Find Your Next Game</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a35;
    --accent: #6ee7b7;
    --accent2: #f472b6;
    --accent3: #a78bfa;
    --accent4: #fbbf24;
    --text: #f0eff4;
    --muted: #6b6a7a;
    --tag-bg: #1e1e2e;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .header {
    padding: 2.5rem 2rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .header h1 {
    font-size: 2.6rem;
    font-weight: 800;
    letter-spacing: -0.05em;
    line-height: 1;
  }
  .accent-dot { color: var(--accent); }
  .tagline {
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 0.5rem;
  }

  /* ── SEARCH ── */
  .search-wrap { padding: 1.25rem 2rem 0; }
  .search {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 0.6rem 1rem;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .search:focus { border-color: var(--accent); }
  .search::placeholder { color: var(--muted); }

  /* ── FILTERS ── */
  .filter-group {
    padding: 0.85rem 2rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.4rem;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .filter-label {
    font-size: 0.62rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-right: 0.25rem;
    min-width: 42px;
  }
  .filter-label.gold { color: var(--accent4); }
  .filter-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 2rem;
    padding: 0.32rem 0.85rem;
    font-size: 0.73rem;
    font-family: 'Syne', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    font-weight: 500;
  }
  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #0d0d0f; border-color: var(--accent); font-weight: 700; }
  .filter-btn.grind-btn:hover { border-color: var(--accent4); color: var(--accent4); }
  .filter-btn.grind-btn.active { background: var(--accent4); border-color: var(--accent4); color: #0d0d0f; }

  /* ── COUNT ── */
  .count {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    padding: 0.65rem 2rem;
    border-bottom: 1px solid var(--border);
  }
  .count span { color: var(--accent); font-weight: 500; }

  /* ── GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
  }
  .card {
    background: var(--surface);
    padding: 1.4rem;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    position: relative;
    overflow: hidden;
  }
  .card:hover { background: var(--surface2); }
  .card-emoji { font-size: 2.4rem; line-height: 1; }
  .card-name { font-size: 1rem; font-weight: 700; letter-spacing: -0.02em; }
  .card-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.55;
    font-family: 'IBM Plex Mono', monospace;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: auto; padding-top: 0.5rem; }
  .tag {
    font-size: 0.65rem;
    font-family: 'IBM Plex Mono', monospace;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
  }
  .tag.genre  { color: var(--accent3); border-color: rgba(167,139,250,0.2); }
  .tag.vibe   { color: var(--accent);  border-color: rgba(110,231,183,0.2); }
  .tag.grind-tag { color: var(--accent4); border-color: rgba(251,191,36,0.2); }

  .players {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    align-items: center;
    gap: 0.35rem;
  }
  .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .badge {
    position: absolute;
    top: 0.85rem; right: 0.85rem;
    font-size: 0.6rem;
    font-weight: 700;
    font-family: 'IBM Plex Mono', monospace;
    padding: 0.15rem 0.45rem;
    border-radius: 2px;
  }
  .badge.new   { background: var(--accent2); color: #0d0d0f; }
  .badge.grind { background: var(--accent4); color: #0d0d0f; }

  .empty {
    padding: 4rem 2rem;
    text-align: center;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.9rem;
    grid-column: 1 / -1;
  }

  /* ── MODAL OVERLAY ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    width: 100%;
    max-width: 580px;
    max-height: 92vh;
    overflow-y: auto;
    position: relative;
  }
  .modal-close {
    position: absolute; top: 1rem; right: 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    z-index: 10;
  }
  .modal-close:hover { color: var(--text); border-color: var(--text); }

  .modal-header {
    padding: 1.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 1.25rem;
    align-items: flex-start;
  }
  .modal-icon {
    font-size: 3.5rem; line-height: 1; flex-shrink: 0;
    background: var(--surface2);
    width: 82px; height: 82px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    border: 1px solid var(--border);
  }
  .modal-meta { flex: 1; min-width: 0; }
  .modal-title {
    font-size: 1.5rem; font-weight: 800;
    letter-spacing: -0.03em; line-height: 1.1;
    margin-bottom: 0.4rem;
  }
  .modal-dev {
    font-size: 0.72rem; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-bottom: 0.65rem;
  }
  .modal-players {
    font-size: 0.75rem;
    font-family: 'IBM Plex Mono', monospace;
    display: flex; align-items: center; gap: 0.4rem;
    color: var(--accent);
  }

  .modal-body { padding: 1.75rem; }
  .modal-section-label {
    font-size: 0.63rem; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase; letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }
  .modal-desc {
    font-size: 0.86rem; color: var(--text);
    line-height: 1.75; font-family: 'IBM Plex Mono', monospace;
    opacity: 0.85; margin-bottom: 1.25rem;
  }
  .modal-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 1.5rem; }
  .modal-tag {
    font-size: 0.7rem; font-family: 'IBM Plex Mono', monospace;
    padding: 0.3rem 0.75rem; border-radius: 3px;
    background: var(--tag-bg); border: 1px solid var(--border);
  }
  .modal-tag.genre  { color: var(--accent3); border-color: rgba(167,139,250,0.2); }
  .modal-tag.vibe   { color: var(--accent);  border-color: rgba(110,231,183,0.2); }
  .modal-tag.grind-tag { color: var(--accent4); border-color: rgba(251,191,36,0.2); }

  .modal-stats {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 1px; background: var(--border);
    border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
    margin-bottom: 1.5rem;
  }
  .stat { background: var(--surface2); padding: 0.85rem 1.1rem; }
  .stat-label { font-size: 0.63rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; margin-bottom: 0.25rem; }
  .stat-val { font-size: 0.95rem; font-weight: 700; color: var(--text); }

  .btn-play {
    width: 100%; padding: 0.8rem;
    background: var(--accent); color: #0d0d0f;
    border: none; border-radius: 5px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s;
    text-decoration: none; display: block; text-align: center;
  }
  .btn-play:hover { opacity: 0.85; }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 1.5rem 2rem;
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  footer a { color: var(--accent); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    .header { padding: 1.5rem 1rem 1rem; }
    .header h1 { font-size: 1.8rem; }
    .search-wrap { padding: 1rem 1rem 0; }
    .filter-group { padding: 0.75rem 1rem; }
    .count { padding: 0.6rem 1rem; }
    .modal-header { flex-direction: column; }
    footer { padding: 1rem; }
  }
</style>
</head>
<body>

<header class="header">
  <h1>ROBLOX<span class="accent-dot">·</span>VAULT</h1>
  <p class="tagline">// find your next obsession. no robux required.</p>
</header>

<div class="search-wrap">
  <input class="search" type="text" id="search" placeholder="search games, genres, vibes...">
</div>

<div class="filter-group">
  <span class="filter-label">genre:</span>
  <button class="filter-btn active" data-filter="all">all</button>
  <button class="filter-btn" data-filter="obby">obby</button>
  <button class="filter-btn" data-filter="tycoon">tycoon</button>
  <button class="filter-btn" data-filter="roleplay">roleplay</button>
  <button class="filter-btn" data-filter="pvp">pvp</button>
  <button class="filter-btn" data-filter="horror">horror</button>
  <button class="filter-btn" data-filter="simulator">simulator</button>
  <button class="filter-btn" data-filter="adventure">adventure</button>
</div>
<div class="filter-group">
  <span class="filter-label gold">grind:</span>
  <button class="filter-btn grind-btn" data-filter="grind">⚡ grind picks</button>
</div>

<div class="count">showing <span id="count-num">0</span> games</div>

<main class="grid" id="grid"></main>

<!-- MODAL -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <div class="modal-header">
      <div class="modal-icon" id="modal-icon" aria-hidden="true"></div>
      <div class="modal-meta">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-dev" id="modal-dev"></div>
        <div class="modal-players"><span class="dot" aria-hidden="true"></span><span id="modal-players"></span> playing now</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-section-label">about this game</div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <div class="modal-stats" id="modal-stats"></div>
      <a class="btn-play" id="modal-play" target="_blank" rel="noopener noreferrer">▶ play on roblox</a>
    </div>
  </div>
</div>

<footer>
  <span>// roblox vault — built for the culture</span>
  <span>not affiliated with roblox corporation</span>
</footer>

<script>
const games = [
  // ROLEPLAY
  { name:"Brookhaven RP", emoji:"🏠", desc:"Live your best suburban life. Or rob a bank. No judgement.", genre:"roleplay", vibe:"chill", players:"527k", dev:"Wolfpaq & Obe", fullDesc:"Brookhaven RP is a massively multiplayer open-world sandbox where there are zero rules and infinite vibes. Buy a house, adopt a car, become a criminal, start a family — or just drive around being chaotic. No objectives. No win conditions. Just pure unfiltered roleplay with strangers on the internet.", visits:"27B+", rating:"93%", maxPlayers:"18", genre2:"Roleplay / Sandbox", url:"https://www.roblox.com/games/4924922222" },
  { name:"Adopt Me!", emoji:"🐾", desc:"Trade pets, build homes, flex your inventory on strangers.", genre:"roleplay", vibe:"chill", players:"412k", dev:"Uplift Games", fullDesc:"Adopt Me! started as a simple adoption roleplay and somehow became the most-played game in Roblox history. The real draw is the pet ecosystem — hatch eggs, raise pets, trade with other players, and accumulate a collection that other players will genuinely envy. Warning: the rare pet economy is surprisingly cutthroat.", visits:"34B+", rating:"91%", maxPlayers:"20", genre2:"Roleplay / Trading", url:"https://www.roblox.com/games/920587237" },
  { name:"Royale High", emoji:"👑", desc:"Fairy school, fashion, quests. The aesthetics are immaculate.", genre:"roleplay", vibe:"chill", players:"88k", dev:"callmehbob", fullDesc:"A fantasy school roleplay with an emphasis on fashion, socialising, and exploration. Royale High has an absurdly detailed cosmetics system, seasonal events, and a surprisingly engaged community. The halo trading economy is its own entire thing. If aesthetics are your thing, this is the one.", visits:"8B+", rating:"90%", maxPlayers:"15", genre2:"Roleplay / Fashion", url:"https://www.roblox.com/games/735030788" },
  { name:"Work at a Pizza Place", emoji:"🍕", desc:"The original Roblox job sim. Someone always ignores their role.", genre:"roleplay", vibe:"chill", players:"31k", dev:"Dued1", fullDesc:"A Roblox classic that's been running since 2008. Players take on roles in a pizza restaurant — cashier, cook, delivery driver, supplier — and attempt to work as a team. In practice, half the server ignores their job and chaos reigns. Strangely fun. Weirdly nostalgic even if you've never played it before.", visits:"1B+", rating:"85%", maxPlayers:"20", genre2:"Simulator / Roleplay", url:"https://www.roblox.com/games/192800" },

  // PVP
  { name:"Murder Mystery 2", emoji:"🔪", desc:"One murderer, one sheriff, everyone else panicking. Good vibes.", genre:"pvp", vibe:"competitive", players:"143k", dev:"Nikilis", fullDesc:"Up to 12 players. One murderer with a knife. One sheriff with a gun. Everyone else just trying not to die. The murderer has to eliminate everyone; the sheriff has to take them out first; innocents have to survive or figure out who's the killer. Rounds are short, chaotic, and intensely suspicious.", visits:"9B+", rating:"92%", maxPlayers:"12", genre2:"Social Deduction / Horror", url:"https://www.roblox.com/games/142823291" },
  { name:"Natural Disaster", emoji:"🌪️", desc:"Survive floods, earthquakes and tornadoes. Team chaos optional.", genre:"pvp", vibe:"casual", players:"62k", dev:"Stickmasterluke", fullDesc:"One of Roblox's oldest and most beloved games. Each round, players are placed on an island and must survive a randomly selected natural disaster — tornado, flood, earthquake, acid rain, you name it. Simple premise, endlessly chaotic execution. The real disaster is usually other players getting in your way.", visits:"2B+", rating:"87%", maxPlayers:"30", genre2:"Survival / Action", url:"https://www.roblox.com/games/189707" },
  { name:"Arsenal", emoji:"🎯", desc:"Fast-paced gun game. Every kill unlocks a new weapon. Chaotic.", genre:"pvp", vibe:"competitive", players:"76k", dev:"ROLVe Community", fullDesc:"Arsenal is Roblox's answer to gun game mode. Every kill earns you a new weapon, cycling from assault rifles all the way down to a rubber duck — first to finish the rotation wins. Fast, frenetic, and accessible. It was the first FPS on Roblox to hit 1 billion visits.", visits:"5B+", rating:"89%", maxPlayers:"20", genre2:"First-Person Shooter", url:"https://www.roblox.com/games/286090429" },
  { name:"Da Hood", emoji:"🌆", desc:"Street RP with PvP everywhere. Not for the faint of heart.", genre:"pvp", vibe:"competitive", players:"94k", dev:"Da Hood Entertainment", fullDesc:"Da Hood is a street-themed roleplay game where PvP is everywhere and consequences are minimal. Rob people, fight rival crews, buy guns and cars, and try to establish dominance. It's loud, chaotic, and extremely online. Has its own entire subculture at this point. Approach with caution and good ping.", visits:"4B+", rating:"82%", maxPlayers:"25", genre2:"Roleplay / PvP", url:"https://www.roblox.com/games/2788229376" },
  { name:"Knockout!", emoji:"🐧", desc:"Penguins on ice. Push everyone off. You can't see their aim. Pure chaos.", genre:"pvp", vibe:"casual", players:"22k", dev:"braxworks", fullDesc:"Knockout! is a physics-based arena brawler where every player is a penguin on a slippery icy platform. The twist: you can't see your opponent's aim or power — you can only predict and react. Last penguin standing wins. Simple to pick up, surprisingly deep to master. Win ice currency to unlock penguin skins.", visits:"200M+", rating:"91%", maxPlayers:"12", genre2:"PvP / Arena Brawler", url:"https://www.roblox.com/games/136764190843219", isNew:true },
  { name:"Street Life", emoji:"🏙️", desc:"London-inspired open world. Get a job, rob a bank, or just cause problems.", genre:"pvp", vibe:"competitive", players:"15k", dev:"Street Life Productions", fullDesc:"Street Life drops you into a virtual city modelled on London where the goal is simply to survive and thrive. Take on legit jobs like delivering burgers or mopping stores, or go full criminal — rob banks, break into cars, and dodge the police. PvP is everywhere and spawn protection won't last long. Five career paths, apartments, weapons, and a full open world to mess around in.", visits:"100M+", rating:"83%", maxPlayers:"20", genre2:"Open World / PvP RP", url:"https://www.roblox.com/games/71600459831333", isNew:true },

  // HORROR
  { name:"Doors", emoji:"🚪", desc:"Open doors. Something's in the hotel. Screaming is optional but expected.", genre:"horror", vibe:"scary", players:"201k", dev:"LSPLASH & RediblesQW", fullDesc:"A first-person roguelite horror set in a massive hotel. Your goal: reach Door 100. Between you and it are 20 unique entities, puzzle rooms, hidden items, and the ever-present threat of Rush barrelling through the corridor. No two runs are the same thanks to procedural generation. Won Best Horror at the 2024 Roblox Innovation Awards.", visits:"3B+", rating:"93%", maxPlayers:"4", genre2:"Horror / Roguelite", url:"https://www.roblox.com/games/6516141723" },
  { name:"The Mimic", emoji:"👁️", desc:"Japanese horror, cryptic lore, and something always behind you.", genre:"horror", vibe:"scary", players:"48k", dev:"MUCDICH", fullDesc:"The Mimic is Roblox horror done properly. Rooted in Japanese folklore and urban legends, it delivers genuinely unsettling atmosphere, cryptic storytelling, and multiple chapters of escalating dread. The entity designs are creative and terrifying. Not for the faint-hearted, and absolutely not one to play with the lights off.", visits:"800M+", rating:"89%", maxPlayers:"6", genre2:"Horror / Story", url:"https://www.roblox.com/games/7355541193" },
  { name:"Apeirophobia", emoji:"🌀", desc:"The backrooms, but make it Roblox. Liminal spaces hit different.", genre:"horror", vibe:"scary", players:"35k", dev:"Polaroid Studios", fullDesc:"Apeirophobia is a backrooms-inspired horror experience with multiple levels, each with its own unsettling aesthetic and entity. The liminal space atmosphere is executed brilliantly — empty offices, fluorescent lighting, the feeling that something is very wrong even when nothing is visibly there. Genuinely creepy.", visits:"1B+", rating:"88%", maxPlayers:"10", genre2:"Horror / Backrooms", url:"https://www.roblox.com/games/6516141723" },

  // OBBY
  { name:"Tower of Hell", emoji:"⚡", desc:"A neon obby with no checkpoints. Pure suffering, beautifully designed.", genre:"obby", vibe:"rage", players:"89k", dev:"YXceptional Studios", fullDesc:"Tower of Hell drops you at the bottom of a randomly generated neon tower and dares you to reach the top — with absolutely no checkpoints. Every section is a different obstacle. You will fall. A lot. The tower changes every round so there's no memorising your way out. Just raw skill, rage, and the occasional miracle.", visits:"18B+", rating:"88%", maxPlayers:"24", genre2:"Obby / Parkour", url:"https://www.roblox.com/games/1962086868" },
  { name:"Obby But You're On a Bike", emoji:"🚲", desc:"Exactly what it says. Surprisingly hard. Surprisingly fun.", genre:"obby", vibe:"casual", players:"12k", dev:"Tomarty", fullDesc:"The name is the entire pitch. You ride a bike through an obstacle course. It sounds stupid. It is stupid. It's also way harder than it has any right to be, and you will spend an embarrassing amount of time on sections that look trivially easy. Highly recommended for a laugh.", visits:"300M+", rating:"84%", maxPlayers:"12", genre2:"Obby / Comedy", url:"https://www.roblox.com/games/5326455366" },

  // TYCOON
  { name:"Jailbreak", emoji:"🚔", desc:"Escape prison, rob trains, get chased. The Roblox GTA experience.", genre:"tycoon", vibe:"competitive", players:"198k", dev:"Badimo", fullDesc:"Play as a prisoner trying to escape and build a criminal empire, or a cop trying to stop them. Rob banks, trains, museums and jewellery stores. Buy faster cars. Get better weapons. Chase or be chased across a massive open world. It's basically Roblox GTA and it absolutely slaps.", visits:"7B+", rating:"91%", maxPlayers:"26", genre2:"Open World / Action", url:"https://www.roblox.com/games/606849621" },
  { name:"Retail Tycoon 2", emoji:"🏪", desc:"Build a shop empire. Watch it fall apart. Rebuild. Repeat.", genre:"tycoon", vibe:"grind", players:"27k", dev:"Haggie125", fullDesc:"Design and manage your own retail store from scratch. Stock shelves, hire staff, expand your floor space, and optimise your layout for maximum profit. The progression is genuinely satisfying and there's a surprising amount of depth for what sounds like a simple tycoon game. One of the best in the genre.", visits:"600M+", rating:"90%", maxPlayers:"6", genre2:"Tycoon / Strategy", url:"https://www.roblox.com/games/5306068389" },

let activeFilter = 'all';
let searchTerm = '';

function render() {
  const grid = document.getElementById('grid');
  const filtered = games.filter(g => {
    if (activeFilter === 'grind') return !!g.isGrind;
    const matchGenre = activeFilter === 'all' || g.genre === activeFilter;
    const q = searchTerm;
    const matchSearch = !q ||
      g.name.toLowerCase().includes(q) ||
      g.genre.includes(q) ||
      g.vibe.includes(q) ||
      g.desc.toLowerCase().includes(q) ||
      (g.dev && g.dev.toLowerCase().includes(q));
    return matchGenre && matchSearch;
  });

  document.getElementById('count-num').textContent = filtered.length;

  if (!filtered.length) {
    grid.innerHTML = '<div class="empty">no games found — try different filters or a broader search.</div>';
    return;
  }

  grid.innerHTML = filtered.map(g => {
    const idx = games.indexOf(g);
    const badgeHtml = g.isGrind
      ? '<span class="badge grind">GRIND</span>'
      : g.isNew ? '<span class="badge new">NEW</span>' : '';
    return `
      <article class="card" onclick="openModal(${idx})" tabindex="0" role="button" aria-label="View details for ${g.name}">
        ${badgeHtml}
        <div class="card-emoji" aria-hidden="true">${g.emoji}</div>
        <div class="card-name">${g.name}</div>
        <div class="card-desc">${g.desc}</div>
        <div class="players"><span class="dot" aria-hidden="true"></span>${g.players} playing</div>
        <div class="card-tags">
          <span class="tag genre">${g.genre}</span>
          <span class="tag vibe">${g.vibe}</span>
          ${g.isGrind ? '<span class="tag grind-tag">grind pick</span>' : ''}
        </div>
      </article>`;
  }).join('');
}

function openModal(idx) {
  const g = games[idx];
  document.getElementById('modal-icon').textContent = g.emoji;
  document.getElementById('modal-title').textContent = g.name;
  document.getElementById('modal-dev').textContent = 'by ' + g.dev;
  document.getElementById('modal-players').textContent = g.players;
  document.getElementById('modal-desc').textContent = g.fullDesc;
  document.getElementById('modal-tags').innerHTML = `
    <span class="modal-tag genre">${g.genre2}</span>
    <span class="modal-tag vibe">${g.vibe}</span>
    ${g.isGrind ? '<span class="modal-tag grind-tag">⚡ grind pick</span>' : ''}
  `;
  document.getElementById('modal-stats').innerHTML = `
    <div class="stat"><div class="stat-label">total visits</div><div class="stat-val">${g.visits}</div></div>
    <div class="stat"><div class="stat-label">rating</div><div class="stat-val">${g.rating}</div></div>
    <div class="stat"><div class="stat-label">max players</div><div class="stat-val">${g.maxPlayers}</div></div>
    <div class="stat"><div class="stat-label">genre</div><div class="stat-val">${g.genre}</div></div>
  `;
  document.getElementById('modal-play').href = g.url;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('modal-close').focus();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

document.getElementById('modal-close').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    render();
  });
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.toLowerCase().trim();
  render();
});

// keyboard nav for cards
document.getElementById('grid').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.target.click();
  }
});

render();
</script>
